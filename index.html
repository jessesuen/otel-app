<!DOCTYPE html>
<html>
  <head>
    <title>Rollouts Demo</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
  </head>
  <body>
    <div class="header">
        <img src="logo.png" class="logo" />
        <h1>ARGO ROLLOUTS <span class="orange">DEMO</span></h1>
    </div>
    <div class="controls">
      <div class="control">
        <div class="colors-row">
          <div>COLOR</div>
          <div class="colors" id="colors"></div>
        </div>
      </div>
      <div class="control">
        <label class="toggle">
          <input type="checkbox" id="toggle-input" checked>
          <span class="toggle__label">TRAFFIC</span>
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </label>
      </div>
      <div class="control">
        <div class="control spread">
          <div>LATENCY</div>
          <div class="white" id="latency-label">0.0s</div>
        </div>
        <input type="range" min="0" max="3" value="0" class="slider" id="latency" step="0.1">
      </div>
      <div class="control">
        <div class="control spread">
          <div>ERROR</div>
          <div class="white" id="error-label">0.0s</div>
        </div>
        <input type="range" min="0" max="100" value="0" class="slider" id="error" step="1">
      </div>
    </div>
    <canvas id="grid" class="grid"></canvas>
    <div id="graph" class="graph"></div>
  </body>
  <script src="main.js"></script>
</html>
